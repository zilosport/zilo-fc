<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zilo FC</title>
    
    <!-- السطر الخاص بمكتبة تليجرام لربط التطبيق بالبيانات الحقيقية -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- يمكنك وضع روابط ملفات CSS الخاصة بك هنا -->
</head>
<body>

    <!-- قسم الملف الشخصي للمشجع -->
    <div class="profile-section">
        <div class="avatar-container">
            <img id="user-avatar" src="https://via.placeholder.com/80" alt="الشعار الشخصي">
            <span class="verified-badge">✓</span>
        </div>
        <h3 id="profile-name" class="user-title">جاري جلب الاسم...</h3>
        <p id="profile-id" class="user-id">معرف التليجرام: --</p>
    </div>

    <!-- صندوق الحضور والمكافأة اليومية -->
    <div class="daily-reward-card">
        <div class="reward-icon">📆</div>
        <div class="reward-info">
            <h4>المكافأة اليومية لـ زيلو سبورت</h4>
            <p>سجل حضورك اليومي لدعم ناديك بـ 200 عملة مجانية!</p>
        </div>
        <button id="btn-daily" class="btn-claim" onclick="claimDaily()">
            احصل على المكافأة الآن
        </button>
    </div>

    <!-- قسم المهام التفاعلية -->
    <div class="tasks-section">
        <h3 class="section-title">🔥 مهام كسب عملة زيلو ($XILO)</h3>
        <p class="section-subtitle">أكمل المهام الرسمية لدعم خزينة نقاط فريقك في الكأس الأوروبي</p>
        
        <div id="tasks-list-container" class="tasks-list">
            <!-- يتم ملء كروت المهام ديناميكياً بواسطة الجافاسكريبت (اكس، يوتيوب، تليجرام) -->
        </div>
    </div>

    <!-- يمكنك وضع روابط ملفات الجافاسكريبت (JS) الخاصة بك هنا في الأسفل -->
</body>
</html>
