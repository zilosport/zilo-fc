name: Deploy Supabase Edge Function
on:
  push:
    branches:
      - main
  workflow_dispatch: # هذا السطر يضيف زر "Run" يدوياً في صفحة Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Function
        # تمت إضافة --no-verify-jwt هنا لإيقاف طلب كلمة المرور لهذه الدالة
        run: supabase functions deploy auth-callback --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
