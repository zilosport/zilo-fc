<!DOCTYPE html>
<html lang="ar" dir="rtl" id="app-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121215">
    <title>ZELO FC App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ==========================================
           🌟 تطبيق زيلو إف سي - ستايل التوهج النبضي (Glowing & Animated)
           ========================================== */

        :root {
            --bg-dark: #121215;        
            --bg-card: rgba(28, 28, 34, 0.6); /* شفافية أكثر لإبراز التوهج */
            --text-main: #f8fafc;      
            --text-muted: #888899;     
            
            /* ألوان التوهج الفخمة */
            --accent-purple: #833ab4;
            --accent-red: #fd1d1d;
            --accent-gold: #fcb045;
            
            /* تأثير الزجاج المتوهج */
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            user-select: none; 
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { display: none; }

        .container {
            margin-top: 85px; 
            margin-bottom: 100px;
            padding: 15px;
            min-height: calc(100vh - 185px);
            animation: fadeUp 0.6s ease-out forwards; 
        }

        /* 👑 الهيدر العلوي */
        .top-bar {
            position: fixed;
            top: 10px;
            left: 15px;
            right: 15px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(18, 18, 22, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 0 20px;
            border-radius: 16px;
            border: 1px solid rgba(252, 176, 69, 0.2); /* حدود ذهبية خفيفة */
            box-shadow: 0 5px 25px rgba(253, 29, 29, 0.15);
            z-index: 1000;
        }

        /* 📱 شريط التنقل السفلي المتوهج */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 4%;
            right: 4%;
            width: 92%;
            height: 70px;
            background: rgba(18, 18, 22, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), 0 0 15px rgba(131, 58, 180, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .nav-item {
            background: none;
            border: none;
            outline: none;
            padding: 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .icon-wrapper {
            font-size: 1.5rem;
            margin-bottom: 3px;
            transition: all 0.3s ease;
            filter: grayscale(100%) opacity(0.6); /* الأيقونات العادية باهتة */
        }

        .nav-text {
            font-size: 0.7rem;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        /* ✨ حالة الزر النشط في الشريط السفلي (التوهج والحركة) */
        .nav-item.active {
            /* خلفية متوهجة بشكل خفيف */
            background: linear-gradient(135deg, rgba(131, 58, 180, 0.15), rgba(253, 29, 29, 0.15));
            border: 1px solid rgba(253, 29, 29, 0.3);
            box-shadow: inset 0 0 10px rgba(252, 176, 69, 0.2);
        }

        .nav-item.active .icon-wrapper {
            filter: grayscale(0%) opacity(1);
            /* حركة الطفو المستمرة والتوهج اللوني */
            animation: floatIcon 2.5s ease-in-out infinite, pulseGlowIcon 2s infinite alternate;
        }

        .nav-item.active .nav-text {
            color: var(--accent-gold);
            text-shadow: 0 0 5px var(--accent-red);
        }

        /* 🃏 البطاقات (تأثير الزجاج الداكن) */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card:active {
            transform: translateY(2px) scale(0.98);
            border-color: rgba(252, 176, 69, 0.4);
            box-shadow: 0 0 20px rgba(253, 29, 29, 0.2);
        }

        /* 🔘 الأزرار الرئيسية المتوهجة والمتحركة */
        .btn-action {
            position: relative;
            width: 100%;
            /* التدرج اللوني الذي طلبته مع حركة مستمرة */
            background: linear-gradient(270deg, var(--accent-purple), var(--accent-red), var(--accent-gold), var(--accent-red), var(--accent-purple));
            background-size: 400% 400%;
            animation: gradientMove 3s ease infinite, pulseShadow 2s infinite alternate;
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 900; 
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            overflow: hidden;
            z-index: 1;
        }

        /* اللمعة البيضاء التي تمر على الزر */
        .btn-action::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg);
            animation: shimmer 3s infinite linear;
            z-index: -1;
        }

        .btn-action:active {
            transform: scale(0.95);
        }

        /* ⬅️ زر العودة الأنيق */
        .btn-back {
            background: rgba(253, 29, 29, 0.1);
            color: var(--accent-gold);
            border: 1px solid rgba(252, 176, 69, 0.3);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(253, 29, 29, 0.15);
        }

        .btn-back:active {
            background: rgba(253, 29, 29, 0.2);
            transform: translateX(5px); /* يتحرك لليمين قليلاً عند الضغط */
        }

        /* ✨ التأثيرات الحركية (Keyframes) */
        
        /* 1. حركة دخول الشاشة */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 2. تحريك ألوان الخلفية في الأزرار */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 3. التوهج الخارجي للأزرار */
        @keyframes pulseShadow {
            0% { box-shadow: 0 0 10px rgba(253, 29, 29, 0.4), 0 5px 15px rgba(131, 58, 180, 0.2); }
            100% { box-shadow: 0 0 25px rgba(252, 176, 69, 0.6), 0 5px 25px rgba(253, 29, 29, 0.4); }
        }

        /* 4. اللمعة البيضاء */
        @keyframes shimmer {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* 5. طفو الأيقونات في الشريط السفلي */
        @keyframes floatIcon {
            0% { transform: translateY(0px) scale(1.1); }
            50% { transform: translateY(-5px) scale(1.15); } /* ترتفع وتكبر قليلاً */
            100% { transform: translateY(0px) scale(1.1); }
        }

        /* 6. توهج الأيقونات */
        @keyframes pulseGlowIcon {
            0% { filter: drop-shadow(0 0 5px var(--accent-purple)); }
            50% { filter: drop-shadow(0 0 15px var(--accent-red)); }
            100% { filter: drop-shadow(0 0 8px var(--accent-gold)); }
        }
    </style>
</head>
<body>

    <header class="top-bar" id="top-bar" style="display: none;">
        <div id="club" style="font-size: 0.9rem; color: #e0e0e0; font-weight: bold;">ناديك: 👑 <b style="color: #fff;">ريال مدريد</b></div>
        <div id="points" style="font-weight: bold; color: var(--accent-gold); background: rgba(252, 176, 69, 0.15); padding: 6px 12px; border-radius: 12px; border: 1px solid rgba(252, 176, 69, 0.3); box-shadow: 0 0 10px rgba(252, 176, 69, 0.2);">🪙 1,500</div>
    </header>

    <main class="container" id="main-content"></main>

    <nav class="bottom-nav" id="bottom-nav" style="display: none;">
        <button class="nav-item active" onclick="showPage('home')">
            <span class="icon icon-wrapper">🏠</span>
            <span class="nav-text">الرئيسية</span>
        </button>
        <button class="nav-item" onclick="showPage('tasks')">
            <span class="icon icon-wrapper">🛠️</span>
            <span class="nav-text">المهام</span>
        </button>
        <button class="nav-item" onclick="showPage('friends')">
            <span class="icon icon-wrapper">👥</span>
            <span class="nav-text">الأصدقاء</span>
        </button>
        <button class="nav-item" onclick="showPage('leaderboard')">
            <span class="icon icon-wrapper">🏆</span>
            <span class="nav-text">الترتيب</span>
        </button>
        <button class="nav-item" onclick="showPage('wallet')">
            <span class="icon icon-wrapper">👛</span>
            <span class="nav-text">المحفظة</span>
        </button>
    </nav>
