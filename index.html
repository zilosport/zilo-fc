<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zelo FC App</title>
    
    <!-- تضمين مكتبة تليجرام الأساسية لكي يعمل التطبيق ويسحب بيانات المستخدم -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- تضمين مكتبة TON Connect الرسمية الحقيقية -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <style>
        /* إعدادات الشاشة الأساسية لمنع التمدد الخاطئ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0e;
            color: #fff;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* 1. البار العلوي الثابت */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #121216;
            border-bottom: 1px solid #22222a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 1000;
        }

        /* 2. منطقة المحتوى (تتحرك بحرية دون التأثير على الأزرار) */
        .content-container {
            margin-top: 60px;    /* مسافة مخصصة للبار العلوي الثابت */
            margin-bottom: 75px; /* مسافة مخصصة للبار السفلي لكي لا يختفي المحتوى خلفه */
            padding: 15px;
            min-height: calc(100vh - 135px);
            overflow-y: auto;
        }

        /* 3. شريط الأزرار السفلي (ثابت تماماً مثل تيك توك وانستغرام) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: rgba(18, 18, 22, 0.95);
            backdrop-filter: blur(10px); /* تأثير زجاجي احترافي */
            border-top: 1px solid #22222a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom); /* دعم هواتف الآيفون الحديثة ذات الحواف */
        }

        /* تصميم الزر المفرد داخل شريط التنقل */
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888899;
            font-size: 0.75rem;
            cursor: pointer;
            background: none;
            border: none;
            flex: 1;
            height: 100%;
            transition: color 0.2s ease;
        }

        .nav-item .icon {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }

        /* حالة الزر النشط المستهدف حالياً */
        .nav-item.active {
            color: #0088cc; /* اللون الأزرق الرسمي للتليجرام وزيلو */
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- البار العلوي -->
    <div class="top-bar" style="display: none;">
        <div id="club" style="font-size: 0.9rem; color: #aaa;">ناديك: 👑 <b>ريال مدريد</b></div>
        <div id="points" style="font-weight: bold; color: #ffd700;">🪙 عملة ZILO: 1,500</div>
    </div>

    <!-- منطقة المحتوى الديناميكي المتحرك -->
    <div class="content-container" id="main-content">
        <!-- يتم رندرة الصفحات هنا بواسطة الجافا سكريبت -->
    </div>

    <!-- شريط الأزرار السفلي الثابت حقيقياً (Fixed) -->
    <div class="bottom-nav" style="display: none;">
        <button class="nav-item active" id="nav-home">
            <span class="icon">🏠</span>
            <span>الرئيسية</span>
        </button>
        <button class="nav-item" id="nav-tasks">
            <span class="icon">🛠️</span>
            <span>المهام</span>
        </button>
        <button class="nav-item" id="nav-friends">
            <span class="icon">👥</span>
            <span>الأصدقاء</span>
        </button>
        <button class="nav-item" id="nav-leaderboard">
            <span class="icon">🏆</span>
            <span>الترتيب</span>
        </button>
        <button class="nav-item" id="nav-wallet">
            <span class="icon">👛</span>
            <span>المحفظة</span>
        </button>
    </div>

    <!-- التعديل الأهم: ربط كود الـ JavaScript المطور الأساسي باستخدام نظام الموديولز -->
    <script type="module" src="app.js"></script>

</body>
</html>
