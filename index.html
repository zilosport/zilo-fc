<!DOCTYPE html>
<html lang="ar" dir="rtl" id="app-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0b0e">
    <title>ZELO FC App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0e;
            color: #fff;
            box-sizing: border-box;
            overflow-x: hidden;
            /* منع تحديد النصوص للحصول على إحساس التطبيقات الأصلية (Native) */
            user-select: none; 
            -webkit-user-select: none;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: rgba(18, 18, 22, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .content-container {
            margin-top: 75px; 
            margin-bottom: 75px;
            padding: 15px;
            min-height: calc(100vh - 150px);
            overflow-y: auto;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: rgba(18, 18, 22, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid #22222a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom); /* دعم خط السحب في أجهزة الآيفون */
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888899;
            font-size: 0.75rem;
            cursor: pointer;
            background: none;
            border: none;
            flex: 1;
            height: 100%;
            transition: color 0.2s ease;
            /* إزالة الوميض الأزرق عند الضغط على الجوال */
            -webkit-tap-highlight-color: transparent; 
        }

        .nav-item .icon {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #0088cc;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="top-bar" id="top-bar" style="display: none;">
        <div id="club" style="font-size: 0.9rem; color: #e0e0e0;">ناديك: 👑 <b style="color: #fff;">ريال مدريد</b></div>
        <div id="points" style="font-weight: bold; color: #ffd700; background: rgba(255, 215, 0, 0.1); padding: 5px 10px; border-radius: 8px;">🪙 عملة ZELO: 1,500</div>
    </header>

    <main class="content-container" id="main-content"></main>

    <nav class="bottom-nav" id="bottom-nav" style="display: none;">
        <button class="nav-item active" onclick="showPage('home')"><span class="icon">🏠</span><span>الرئيسية</span></button>
        <button class="nav-item" onclick="showPage('tasks')"><span class="icon">🛠️</span><span>المهام</span></button>
        <button class="nav-item" onclick="showPage('friends')"><span class="icon">👥</span><span>الأصدقاء</span></button>
        <button class="nav-item" onclick="showPage('leaderboard')"><span class="icon">🏆</span><span>الترتيب</span></button>
        <button class="nav-item" onclick="showPage('wallet')"><span class="icon">👛</span><span>المحفظة</span></button>
    </nav>

    <script src="clubsData.js?v=2"></script>
    <script src="data.js?v=2"></script> 
    <script src="countries.js?v=2"></script>
    <script src="login.js?v=2"></script>
    <script src="weekly_ranking.js?v=2"></script>
    <script src="home.js?v=2"></script>
    <script src="tasks.js?v=2"></script>
    <script src="leaderboard.js?v=2"></script>
    <script src="friends.js?v=2"></script>
    <script src="wallet.js?v=2"></script>
    <script src="app.js?v=2"></script>

</body>
</html>
